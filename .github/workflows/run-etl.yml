name: Run ETL

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      # A full DATABASE_URL (from Neon/Supabase) is all that's required.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Optional overrides — safe to leave unset (code has sensible defaults).
      COINS: ${{ vars.COINS }}
      VS_CURRENCY: ${{ vars.VS_CURRENCY }}
      HISTORY_DAYS: ${{ vars.HISTORY_DAYS }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run ETL
        run: python main.py
